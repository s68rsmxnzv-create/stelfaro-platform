server {
    server_name billing.stelfaro.com;

    root /var/www/stelfaro-platform/apps/billing-demo/dist;
    index index.html;

    location ^~ /api/ {
        proxy_pass https://dte.stelfaro.me/api/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;

        proxy_set_header Host dte.stelfaro.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /admin/assets/ {
        alias /var/www/stelfaro-platform/apps/platform-admin/dist/assets/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /admin/ {
        alias /var/www/stelfaro-platform/apps/platform-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/billing.stelfaro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/billing.stelfaro.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = billing.stelfaro.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name billing.stelfaro.com;
    return 404;
}
